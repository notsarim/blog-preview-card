<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="https://fonts.google.com/specimen/Figtree" />

    <title>Frontend Mentor | Blog preview card</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <img
          src="./assets/images/illustration-article.svg"
          alt="Card illustration"
          class="card-image"
        />
        <div class="card-content">
          <div class="category"><span>Learning</span></div>
          <p class="published-date">Published 21 Dec 2023</p>
          <h1 class="card-title">HTML & CSS foundations</h1>
          <p class="card-description">
            These languages are the backbone of every website, defining
            structure, content, and presentation. Greg Hooper
          </p>
          <div class="card-footer">
            <img
              src="./assets/images/image-avatar.webp"
              alt="User Avatar"
              class="avatar"
            />
            <p class="author">Greg Hooper</p>
          </div>
        </div>
      </div>
    </div>
    <!-- Learning Published 21 Dec 2023 HTML & CSS foundations These languages are
    the backbone of every website, defining structure, content, and
    presentation. Greg Hooper -->

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
